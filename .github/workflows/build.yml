name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source files
        run: |
          for f in doomgeneric_vita.c CMakeLists.txt; do
            if [ ! -f "$f" ]; then echo "MANCANTE: $f"; exit 1; fi
            echo "OK: $f"
          done

      - name: Install VitaSDK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./bootstrap-vitasdk.sh
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Generate LiveArea assets
        run: |
          rm -rf sce_sys
          mkdir -p sce_sys/livearea/contents

          python3 << 'PYEOF'
          import struct, zlib, os

          def make_png(width, height, r, g, b, path):
              """Crea PNG RGB 24-bit minimale - solo IHDR+IDAT+IEND"""
              def chunk(ctype, data):
                  c = ctype + data
                  crc = zlib.crc32(c) & 0xffffffff
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', crc)

              sig = b'\x89PNG\r\n\x1a\n'

              # IHDR: width, height, bit_depth=8, color_type=2(RGB), compress=0, filter=0, interlace=0
              ihdr = struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)

              # Pixel data: filter_byte(0) + RGB per ogni riga
              row = bytes([r, g, b] * width)
              raw = b''
              for y in range(height):
                  raw += b'\x00' + row

              idat = zlib.compress(raw, 9)

              png = sig + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')

              os.makedirs(os.path.dirname(path) if os.path.dirname(path) else '.', exist_ok=True)
              with open(path, 'wb') as f:
                  f.write(png)

              # Verifica
              with open(path, 'rb') as f:
                  d = f.read(30)
              assert d[:8] == b'\x89PNG\r\n\x1a\n', "Header PNG invalido"
              assert d[24] == 8, f"bit_depth={d[24]}, atteso 8"
              assert d[25] == 2, f"color_type={d[25]}, atteso 2 (RGB)"
              fsize = os.path.getsize(path)
              print(f"OK: {path} ({width}x{height}, RGB 24-bit, {fsize} bytes)")

          # Colori: verde scuro Chex-like
          make_png(128, 128,  46, 139,  87, "sce_sys/icon0.png")
          make_png(840, 500,  15,  52,  96, "sce_sys/livearea/contents/bg.png")
          make_png(280, 158, 233,  69,  96, "sce_sys/livearea/contents/startup.png")

          print("\nTutti i PNG generati - minimali, solo IHDR+IDAT+IEND, RGB 24-bit")
          PYEOF

          # --- TEMPLATE.XML ---
          printf '<?xml version="1.0" encoding="utf-8"?>\n' > sce_sys/livearea/contents/template.xml
          printf '<livearea style="a1" format-ver="01.00" content-rev="1">\n' >> sce_sys/livearea/contents/template.xml
          printf '  <livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <image>bg.png</image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '  <gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <startup-image>startup.png</startup-image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '</livearea>\n' >> sce_sys/livearea/contents/template.xml

          echo ""
          echo "=== VERIFICA ==="
          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            echo -n "$f: "
            xxd -l 30 -p "$f" | head -1
          done
          echo ""
          echo "=== template.xml ==="
          cat sce_sys/livearea/contents/template.xml
          echo ""
          xxd -l 4 -p sce_sys/livearea/contents/template.xml

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Create VPK
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH

          ls -la build/ChexQuestVita.self

          # Crea param.sfo
          vita-mksfoex -s TITLE_ID=CHEX00001 -s APP_VER=01.00 "ChexQuest" build/param.sfo
          echo "=== param.sfo ==="
          strings build/param.sfo

          # Assembla struttura VPK
          mkdir -p vpk_root/sce_sys/livearea/contents

          cp build/ChexQuestVita.self vpk_root/eboot.bin
          cp build/param.sfo         vpk_root/sce_sys/param.sfo
          cp sce_sys/icon0.png       vpk_root/sce_sys/icon0.png
          cp sce_sys/livearea/contents/bg.png      vpk_root/sce_sys/livearea/contents/bg.png
          cp sce_sys/livearea/contents/startup.png  vpk_root/sce_sys/livearea/contents/startup.png
          cp sce_sys/livearea/contents/template.xml vpk_root/sce_sys/livearea/contents/template.xml

          echo ""
          echo "=== Struttura vpk_root ==="
          find vpk_root -type f | sort
          echo ""

          # Crea ZIP senza prefisso ./ — IMPORTANTE per la Vita
          cd vpk_root
          zip -0 ../build/ChexQuestVita.vpk \
            eboot.bin \
            sce_sys/param.sfo \
            sce_sys/icon0.png \
            sce_sys/livearea/contents/bg.png \
            sce_sys/livearea/contents/startup.png \
            sce_sys/livearea/contents/template.xml
          cd ..

          echo ""
          ls -lh build/ChexQuestVita.vpk

      - name: Verify VPK
        run: |
          echo "=== Contenuto VPK ==="
          unzip -l build/ChexQuestVita.vpk
          echo ""

          mkdir -p /tmp/vpk_check
          unzip -o build/ChexQuestVita.vpk -d /tmp/vpk_check

          echo "=== Verifica files ==="
          for f in eboot.bin sce_sys/param.sfo sce_sys/icon0.png \
                   sce_sys/livearea/contents/template.xml \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            if [ ! -s "/tmp/vpk_check/$f" ]; then
              echo "MANCANTE: $f"
              exit 1
            fi
            echo "OK: $f ($(wc -c < /tmp/vpk_check/$f) bytes)"
          done

          echo ""
          echo "=== param.sfo ==="
          strings /tmp/vpk_check/sce_sys/param.sfo

          echo ""
          echo "=== PNG headers ==="
          for png in sce_sys/icon0.png \
                     sce_sys/livearea/contents/bg.png \
                     sce_sys/livearea/contents/startup.png; do
            echo -n "$png: bit_depth="
            python3 -c "
          with open('/tmp/vpk_check/$png','rb') as f: d=f.read(30)
          print(f'{d[24]} color_type={d[25]} ({\"RGB\" if d[25]==2 else \"ALTRO\"})')
          "
          done

          echo ""
          echo "=== template.xml ==="
          cat /tmp/vpk_check/sce_sys/livearea/contents/template.xml

          rm -rf /tmp/vpk_check

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/ChexQuestVita.vpk
