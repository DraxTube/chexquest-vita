name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source files
        run: |
          for f in doomgeneric_vita.c CMakeLists.txt; do
            if [ ! -f "$f" ]; then echo "MISSING: $f"; exit 1; fi
            echo "OK: $f"
          done

      - name: Install PNG tools
        run: |
          sudo apt-get update
           sudo apt-get install -y optipng python3-pil
      - name: Install VitaSDK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./bootstrap-vitasdk.sh
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Sanitize PNGs for Vita
        run: |
          chmod +x sanitize_pngs.sh
          if [ -d assets ] && ls assets/*.png 1>/dev/null 2>&1; then
            echo "Found PNGs in assets/"
            ./sanitize_pngs.sh assets sce_sys
          else
            echo "No assets/ or no PNGs — skip"
          fi

      - name: Verify sanitized PNGs
        run: |
          echo "=== PNG chunk inspection ==="
          find sce_sys -name "*.png" 2>/dev/null | while read f; do
            echo "--- $f ---"
            file "$f"
            python3 -c "
          import struct
          with open('$f','rb') as fp:
              fp.read(8)
              chunks = []
              while True:
                  hdr = fp.read(8)
                  if len(hdr) < 8: break
                  length = struct.unpack('>I', hdr[:4])[0]
                  ctype = hdr[4:8].decode('ascii','replace')
                  chunks.append(ctype)
                  fp.seek(length + 4, 1)
              print(f'  Chunks: {chunks}')
              bad = [c for c in chunks if c in ('iCCP','sRGB','gAMA','cHRM','tEXt','iTXt','zTXt','tIME')]
              if bad: print(f'  WARNING: {bad}')
              else: print('  CLEAN')
          "
          done || echo "No PNGs found"

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Repack VPK without compression
        run: |
          cd build
          mkdir -p /tmp/vpk_repack
          unzip -o *.vpk -d /tmp/vpk_repack
          rm -f *.vpk
          cd /tmp/vpk_repack
          zip -0 -r $OLDPWD/ChexQuestVita.vpk .
          cd $OLDPWD
          rm -rf /tmp/vpk_repack
          ls -lh *.vpk

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/*.vpk
