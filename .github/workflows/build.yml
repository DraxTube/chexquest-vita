name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source files
        run: |
          for f in doomgeneric_vita.c CMakeLists.txt; do
            if [ ! -f "$f" ]; then echo "MANCANTE: $f"; exit 1; fi
            echo "OK: $f"
          done

      - name: Install VitaSDK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./bootstrap-vitasdk.sh
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Generate LiveArea assets
        run: |
          sudo apt-get install -y python3-pip pngcheck
          pip3 install Pillow

          rm -rf sce_sys
          mkdir -p sce_sys/livearea/contents

          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          from PIL.PngImagePlugin import PngInfo
          import urllib.request
          import os

          def save_vita_png(img, path):
              rgb = img.convert('RGB')
              rgb.info = {}
              info = PngInfo()
              rgb.save(path, 'PNG', pnginfo=info, optimize=False)
              check = Image.open(path)
              assert check.mode == 'RGB', f"{path}: mode={check.mode}"
              print(f"  OK: {path} size={check.size} mode={check.mode} file={os.path.getsize(path)}B")

          title_img = None
          try:
              urllib.request.urlretrieve(
                  "https://tcrf.net/images/1/11/Chex_Quest-title.png",
                  "/tmp/chex_title.png"
              )
              title_img = Image.open("/tmp/chex_title.png").convert('RGB')
              print(f"Title screen OK: {title_img.size}")
          except Exception as e:
              print(f"Title non disponibile: {e}")

          try:
              fb = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 48)
              fm = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 36)
              ft = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 28)
              fs = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 14)
              fx = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 11)
          except:
              fb = fm = ft = fs = fx = ImageFont.load_default()

          print("\n=== ICON0.PNG (128x128) ===")
          if title_img:
              save_vita_png(title_img.resize((128, 128), Image.LANCZOS), "sce_sys/icon0.png")
          else:
              icon = Image.new('RGB', (128, 128), (46, 139, 87))
              d = ImageDraw.Draw(icon)
              d.text((64, 48), "CQ", fill=(255, 215, 0), font=ft, anchor="mm")
              d.text((64, 80), "CHEX QUEST", fill=(255, 255, 255), font=fx, anchor="mm")
              save_vita_png(icon, "sce_sys/icon0.png")

          print("\n=== BG.PNG (840x500) ===")
          if title_img:
              save_vita_png(title_img.resize((840, 500), Image.LANCZOS), "sce_sys/livearea/contents/bg.png")
          else:
              bg = Image.new('RGB', (840, 500), (15, 52, 96))
              d = ImageDraw.Draw(bg)
              d.text((420, 230), "CHEX QUEST", fill=(255, 255, 255), font=fb, anchor="mm")
              d.text((420, 280), "PS Vita", fill=(200, 200, 200), font=fs, anchor="mm")
              save_vita_png(bg, "sce_sys/livearea/contents/bg.png")

          print("\n=== STARTUP.PNG (280x158) ===")
          if title_img:
              save_vita_png(title_img.resize((280, 158), Image.LANCZOS), "sce_sys/livearea/contents/startup.png")
          else:
              su = Image.new('RGB', (280, 158), (233, 69, 96))
              d = ImageDraw.Draw(su)
              d.text((140, 65), "PLAY", fill=(255, 255, 255), font=fm, anchor="mm")
              d.text((140, 100), "CHEX QUEST", fill=(255, 215, 0), font=fs, anchor="mm")
              save_vita_png(su, "sce_sys/livearea/contents/startup.png")

          print("\nDone")
          PYEOF

          printf '<?xml version="1.0" encoding="utf-8"?>\n' > sce_sys/livearea/contents/template.xml
          printf '<livearea style="a1" format-ver="01.00" content-rev="1">\n' >> sce_sys/livearea/contents/template.xml
          printf '  <livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <image>bg.png</image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '  <gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <startup-image>startup.png</startup-image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '</livearea>\n' >> sce_sys/livearea/contents/template.xml

          echo "=== VALIDAZIONE ==="
          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            pngcheck "$f"
          done
          cat sce_sys/livearea/contents/template.xml

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Create VPK manually
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH

          echo "=== Verifica self ==="
          ls -la build/ChexQuestVita.self

          echo "=== Creazione param.sfo ==="
          vita-mksfoex -s TITLE_ID=CHEX00001 -s APP_VER=01.00 "ChexQuest" build/param.sfo
          strings build/param.sfo
          echo ""

          echo "=== Assemblaggio VPK ==="
          mkdir -p vpk_root/sce_sys/livearea/contents

          cp build/ChexQuestVita.self vpk_root/eboot.bin
          cp build/param.sfo vpk_root/sce_sys/param.sfo
          cp sce_sys/icon0.png vpk_root/sce_sys/icon0.png
          cp sce_sys/livearea/contents/bg.png vpk_root/sce_sys/livearea/contents/bg.png
          cp sce_sys/livearea/contents/startup.png vpk_root/sce_sys/livearea/contents/startup.png
          cp sce_sys/livearea/contents/template.xml vpk_root/sce_sys/livearea/contents/template.xml

          echo "=== Contenuto vpk_root ==="
          find vpk_root -type f -exec ls -la {} \;
          echo ""

          cd vpk_root
          zip -0 -r ../build/ChexQuestVita.vpk .
          cd ..

          echo ""
          echo "=== VPK finale ==="
          ls -lh build/ChexQuestVita.vpk

      - name: Verify VPK
        run: |
          cd build
          echo "=== Contenuto VPK ==="
          unzip -l ChexQuestVita.vpk
          echo ""

          mkdir -p /tmp/vpk_check
          unzip -o ChexQuestVita.vpk -d /tmp/vpk_check

          echo "=== Verifica files ==="
          for f in eboot.bin sce_sys/param.sfo sce_sys/icon0.png \
                   sce_sys/livearea/contents/template.xml \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            if [ ! -s "/tmp/vpk_check/$f" ]; then
              echo "MANCANTE: $f"
              exit 1
            fi
            echo "OK: $f ($(wc -c < /tmp/vpk_check/$f) bytes)"
          done

          echo ""
          echo "=== param.sfo ==="
          strings /tmp/vpk_check/sce_sys/param.sfo

          echo ""
          echo "=== PNG ==="
          for png in sce_sys/icon0.png \
                     sce_sys/livearea/contents/bg.png \
                     sce_sys/livearea/contents/startup.png; do
            pngcheck "/tmp/vpk_check/$png"
          done

          echo ""
          echo "=== template.xml ==="
          cat /tmp/vpk_check/sce_sys/livearea/contents/template.xml

          rm -rf /tmp/vpk_check

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/ChexQuestVita.vpk
