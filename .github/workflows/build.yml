name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source files
        run: |
          for f in doomgeneric_vita.c CMakeLists.txt; do
            if [ ! -f "$f" ]; then echo "MANCANTE: $f"; exit 1; fi
            echo "OK: $f"
          done

      - name: Install VitaSDK
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          ./bootstrap-vitasdk.sh
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Generate LiveArea assets
        run: |
          sudo apt-get install -y imagemagick pngcheck

          rm -rf sce_sys
          mkdir -p sce_sys/livearea/contents

          TITLE_OK=0
          curl -sL --max-time 20 -o /tmp/chex_title_raw.png \
            "https://tcrf.net/images/1/11/Chex_Quest-title.png" 2>/dev/null || true
          if [ -s /tmp/chex_title_raw.png ] && file /tmp/chex_title_raw.png | grep -qi "PNG"; then
            TITLE_OK=1
            echo "Title screen scaricato OK"
          else
            echo "Title screen non disponibile, uso fallback"
            rm -f /tmp/chex_title_raw.png
          fi

          VITA_PNG_OPTS="-strip -interlace none -define png:color-type=6 -define png:exclude-chunks=all -depth 8"

          # --- ICON0.PNG (128x128) ---
          if [ "$TITLE_OK" = "1" ]; then
            convert /tmp/chex_title_raw.png \
              -resize 128x128^ -gravity center -extent 128x128 \
              -background '#1a1a2e' -flatten -alpha on -alpha set \
              $VITA_PNG_OPTS \
              sce_sys/icon0.png
          else
            convert -size 128x128 xc:'#2E8B57' \
              -fill '#FFD700' -gravity center \
              -font DejaVu-Sans-Bold -pointsize 28 \
              -annotate +0-8 'CQ' \
              -fill white -pointsize 11 \
              -annotate +0+16 'CHEX QUEST' \
              -alpha on -alpha set \
              $VITA_PNG_OPTS \
              sce_sys/icon0.png
          fi

          # --- BG.PNG (840x500) ---
          if [ "$TITLE_OK" = "1" ]; then
            convert /tmp/chex_title_raw.png \
              -resize 840x500^ -gravity center -extent 840x500 \
              -background '#000000' -flatten -alpha on -alpha set \
              $VITA_PNG_OPTS \
              sce_sys/livearea/contents/bg.png
          else
            convert -size 840x500 xc:'#0f3460' \
              -fill white -gravity center \
              -font DejaVu-Sans-Bold -pointsize 48 \
              -annotate +0-20 'CHEX QUEST' \
              -fill '#cccccc' -pointsize 20 \
              -annotate +0+30 'PS Vita' \
              -alpha on -alpha set \
              $VITA_PNG_OPTS \
              sce_sys/livearea/contents/bg.png
          fi

          # --- STARTUP.PNG (280x158) ---
          if [ "$TITLE_OK" = "1" ]; then
            convert /tmp/chex_title_raw.png \
              -resize 280x158^ -gravity center -extent 280x158 \
              -background '#000000' -flatten -alpha on -alpha set \
              $VITA_PNG_OPTS \
              sce_sys/livearea/contents/startup.png
          else
            convert -size 280x158 xc:'#e94560' \
              -fill white -gravity center \
              -font DejaVu-Sans-Bold -pointsize 36 \
              -annotate +0-8 'PLAY' \
              -fill '#FFD700' -pointsize 14 \
              -annotate +0+22 'CHEX QUEST' \
              -alpha on -alpha set \
              $VITA_PNG_OPTS \
              sce_sys/livearea/contents/startup.png
          fi

          # --- TEMPLATE.XML ---
          printf '<?xml version="1.0" encoding="utf-8"?>\n' > sce_sys/livearea/contents/template.xml
          printf '<livearea style="a1" format-ver="01.00" content-rev="1">\n' >> sce_sys/livearea/contents/template.xml
          printf '  <livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <image>bg.png</image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '  <gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <startup-image>startup.png</startup-image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '</livearea>\n' >> sce_sys/livearea/contents/template.xml

          # --- VALIDAZIONE ---
          echo ""
          echo "=== VALIDAZIONE ASSETS ==="
          FAIL=0

          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            if [ ! -s "$f" ]; then
              echo "ERRORE: $f mancante!"
              FAIL=1
              continue
            fi
            SIZE=$(wc -c < "$f")
            echo "OK: $f ($SIZE bytes)"
            identify "$f"
            COLOR_TYPE=$(identify -verbose "$f" | grep "Type:" | head -1)
            echo "  Color: $COLOR_TYPE"
            pngcheck "$f" || { echo "ERRORE: $f non supera pngcheck!"; FAIL=1; }
          done

          if [ ! -s sce_sys/livearea/contents/template.xml ]; then
            echo "ERRORE: template.xml mancante!"
            FAIL=1
          else
            echo "OK: template.xml ($(wc -c < sce_sys/livearea/contents/template.xml) bytes)"
          fi

          FIRST_BYTE=$(xxd -l 1 -p sce_sys/livearea/contents/template.xml)
          if [ "$FIRST_BYTE" != "3c" ]; then
            echo "ERRORE: template.xml ha BOM (primo byte: 0x$FIRST_BYTE)"
            FAIL=1
          fi

          echo ""
          echo "=== CONTENUTO template.xml ==="
          cat sce_sys/livearea/contents/template.xml
          echo ""
          echo "=== HEX primi 40 bytes template.xml ==="
          xxd -l 40 sce_sys/livearea/contents/template.xml

          if [ $FAIL -ne 0 ]; then
            echo "ERRORE: validazione fallita!"
            exit 1
          fi

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Verify VPK
        run: |
          cd build
          echo "=== File nel VPK ==="
          unzip -l *.vpk
          echo ""
          echo "=== Verifica struttura ==="
          mkdir -p /tmp/vpk_check
          unzip -o *.vpk -d /tmp/vpk_check

          for f in eboot.bin sce_sys/param.sfo sce_sys/icon0.png \
                   sce_sys/livearea/contents/template.xml \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            if [ ! -s "/tmp/vpk_check/$f" ]; then
              echo "MANCANTE NEL VPK: $f"
              exit 1
            fi
            echo "VPK OK: $f ($(wc -c < /tmp/vpk_check/$f) bytes)"
          done

          echo ""
          echo "=== param.sfo ==="
          strings /tmp/vpk_check/sce_sys/param.sfo | grep -i "chex" || echo "ATTENZIONE: nome app non trovato in param.sfo"

          echo ""
          for png in sce_sys/icon0.png \
                     sce_sys/livearea/contents/bg.png \
                     sce_sys/livearea/contents/startup.png; do
            echo "--- $png ---"
            identify "/tmp/vpk_check/$png"
            pngcheck "/tmp/vpk_check/$png" || true
          done

          echo ""
          echo "=== Dimensione VPK ==="
          ls -lh *.vpk

          rm -rf /tmp/vpk_check

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/*.vpk
