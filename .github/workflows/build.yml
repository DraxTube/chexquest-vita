name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source files
        run: |
          for f in doomgeneric_vita.c CMakeLists.txt; do
            if [ ! -f "$f" ]; then echo "MANCANTE: $f"; exit 1; fi
            echo "OK: $f"
          done

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick pngcrush

      - name: Convert LiveArea assets for PS Vita
        run: |
          set -e
          mkdir -p sce_sys/livearea/contents

          convert_vita_png() {
            local input="$1"
            local output="$2"
            local w="$3"
            local h="$4"
            local tmp_bmp="/tmp/vita_$$.bmp"
            local tmp_png="/tmp/vita_$$.png"
            local tmp_crush="/tmp/vita_crush_$$.png"

            echo "--- Conversione: $input -> $output (${w}x${h}) ---"

            # Passo 1: Forza dimensioni e rimuovi alpha -> BMP (zero metadata)
            convert "$input" \
              -resize "${w}x${h}!" \
              -alpha off \
              -colorspace sRGB \
              -type TrueColor \
              -depth 8 \
              "BMP3:${tmp_bmp}"
            echo "  BMP: $(wc -c < "$tmp_bmp") bytes"

            # Passo 2: BMP -> PNG minimale
            convert "${tmp_bmp}" \
              -type TrueColor \
              -depth 8 \
              -define png:color-type=2 \
              -define png:bit-depth=8 \
              "PNG24:${tmp_png}"
            echo "  PNG pre-crush: $(wc -c < "$tmp_png") bytes"

            # Passo 3: pngcrush elimina TUTTI i chunk non essenziali
            pngcrush -rem alla -rem allb -rem text -rem gAMA -rem cHRM \
                     -rem iCCP -rem sRGB -rem tEXt -rem iTXt -rem zTXt \
                     -rem tIME -rem pHYs \
                     -force \
                     "${tmp_png}" "${tmp_crush}" 2>/dev/null

            if [ -f "${tmp_crush}" ] && [ -s "${tmp_crush}" ]; then
              cp "${tmp_crush}" "$output"
            else
              echo "  WARN: pngcrush fallito, uso PNG senza crush"
              cp "${tmp_png}" "$output"
            fi

            rm -f "${tmp_bmp}" "${tmp_png}" "${tmp_crush}"

            # Verifica
            local info=$(identify -format 'size=%wx%h depth=%[bit-depth] type=%[type] interlace=%[interlace]' "$output" 2>/dev/null)
            local fsize=$(wc -c < "$output")
            echo "  FINALE: $info ($fsize bytes)"

            # Verifica header PNG (primi 8 bytes devono essere 89 50 4E 47 0D 0A 1A 0A)
            local header=$(xxd -p -l 8 "$output")
            if [ "$header" = "89504e470d0a1a0a" ]; then
              echo "  Header PNG: OK"
            else
              echo "  ERRORE: Header PNG invalido: $header"
              exit 1
            fi

            # Verifica dimensioni esatte
            local actual_w=$(identify -format '%w' "$output" 2>/dev/null)
            local actual_h=$(identify -format '%h' "$output" 2>/dev/null)
            if [ "$actual_w" != "$w" ] || [ "$actual_h" != "$h" ]; then
              echo "  ERRORE: Dimensioni ${actual_w}x${actual_h} invece di ${w}x${h}"
              exit 1
            fi
            echo "  Dimensioni: OK (${actual_w}x${actual_h})"
            echo ""
          }

          # --- icon0.png: 128x128 ---
          if [ -f sce_sys/icon0.png ]; then
            convert_vita_png sce_sys/icon0.png sce_sys/icon0.png 128 128
          else
            echo "icon0.png non trovato, genero placeholder..."
            convert -size 128x128 xc:'#2E8B57' \
              -fill '#FFD700' -gravity center -pointsize 40 -annotate +0+0 'CQ' \
              -alpha off -type TrueColor -depth 8 \
              "BMP3:/tmp/icon_placeholder.bmp"
            convert "/tmp/icon_placeholder.bmp" -type TrueColor -depth 8 \
              -define png:color-type=2 -define png:bit-depth=8 \
              "PNG24:sce_sys/icon0.png"
            pngcrush -rem alla -force sce_sys/icon0.png /tmp/icon_crush.png 2>/dev/null \
              && mv /tmp/icon_crush.png sce_sys/icon0.png
            rm -f /tmp/icon_placeholder.bmp
          fi

          # --- bg.png: 840x500 ---
          if [ -f sce_sys/livearea/contents/bg.png ]; then
            convert_vita_png sce_sys/livearea/contents/bg.png sce_sys/livearea/contents/bg.png 840 500
          else
            echo "bg.png non trovato, genero placeholder..."
            convert -size 840x500 xc:'#0f3460' \
              -fill white -gravity center -pointsize 60 -annotate +0+0 'CHEX QUEST' \
              -alpha off -type TrueColor -depth 8 \
              "BMP3:/tmp/bg_placeholder.bmp"
            convert "/tmp/bg_placeholder.bmp" -type TrueColor -depth 8 \
              -define png:color-type=2 -define png:bit-depth=8 \
              "PNG24:sce_sys/livearea/contents/bg.png"
            pngcrush -rem alla -force sce_sys/livearea/contents/bg.png /tmp/bg_crush.png 2>/dev/null \
              && mv /tmp/bg_crush.png sce_sys/livearea/contents/bg.png
            rm -f /tmp/bg_placeholder.bmp
          fi

          # --- startup.png: 280x158 ---
          if [ -f sce_sys/livearea/contents/startup.png ]; then
            convert_vita_png sce_sys/livearea/contents/startup.png sce_sys/livearea/contents/startup.png 280 158
          else
            echo "startup.png non trovato, genero placeholder..."
            convert -size 280x158 xc:'#e94560' \
              -fill white -gravity center -pointsize 40 -annotate +0+0 'PLAY' \
              -alpha off -type TrueColor -depth 8 \
              "BMP3:/tmp/startup_placeholder.bmp"
            convert "/tmp/startup_placeholder.bmp" -type TrueColor -depth 8 \
              -define png:color-type=2 -define png:bit-depth=8 \
              "PNG24:sce_sys/livearea/contents/startup.png"
            pngcrush -rem alla -force sce_sys/livearea/contents/startup.png /tmp/startup_crush.png 2>/dev/null \
              && mv /tmp/startup_crush.png sce_sys/livearea/contents/startup.png
            rm -f /tmp/startup_placeholder.bmp
          fi

          # --- template.xml (UTF-8, no BOM, Unix line endings) ---
          printf '<?xml version="1.0" encoding="utf-8"?>\n' > sce_sys/livearea/contents/template.xml
          printf '<livearea style="a1" format-ver="01.00" content-rev="1">\n' >> sce_sys/livearea/contents/template.xml
          printf '  <livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <image>bg.png</image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '  <gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <startup-image>startup.png</startup-image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '</livearea>\n' >> sce_sys/livearea/contents/template.xml

          echo "=== template.xml ==="
          cat sce_sys/livearea/contents/template.xml
          echo ""
          echo "template.xml bytes: $(wc -c < sce_sys/livearea/contents/template.xml)"
          echo "template.xml hex dump (primi 20 byte):"
          xxd -l 20 sce_sys/livearea/contents/template.xml

          # --- Riepilogo finale ---
          echo ""
          echo "========================================="
          echo "=== RIEPILOGO ASSETS LIVEAREA ==="
          echo "========================================="
          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png \
                   sce_sys/livearea/contents/template.xml; do
            if [ -f "$f" ]; then
              echo "OK: $f ($(wc -c < "$f") bytes)"
            else
              echo "ERRORE: $f MANCANTE"
              exit 1
            fi
          done

          # Dump chunk PNG per debug
          echo ""
          echo "=== CHUNK PNG (deve avere SOLO IHDR, IDAT, IEND) ==="
          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            echo "$f:"
            python3 -c "
          import struct, sys
          with open('$f', 'rb') as fp:
              fp.read(8)  # signature
              chunks = []
              while True:
                  hdr = fp.read(8)
                  if len(hdr) < 8: break
                  length = struct.unpack('>I', hdr[:4])[0]
                  name = hdr[4:8].decode('ascii', errors='replace')
                  chunks.append(f'  {name} ({length} bytes)')
                  fp.seek(length + 4, 1)  # skip data + CRC
              print('\n'.join(chunks))
          " 2>/dev/null || echo "  (impossibile analizzare)"
            echo ""
          done

      - name: Install VitaSDK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./bootstrap-vitasdk.sh
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Verify VPK
        run: |
          cd build
          echo "=== Contenuto VPK ==="
          unzip -l *.vpk
          echo ""
          echo "=== Verifica file nel VPK ==="
          mkdir -p /tmp/vpk_check
          unzip -o *.vpk -d /tmp/vpk_check
          for f in eboot.bin sce_sys/param.sfo sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png \
                   sce_sys/livearea/contents/template.xml; do
            if [ -f "/tmp/vpk_check/$f" ]; then
              echo "OK: $f ($(wc -c < /tmp/vpk_check/$f) bytes)"
            else
              echo "MANCANTE: $f"
              exit 1
            fi
          done

          echo ""
          echo "=== Verifica PNG dentro VPK ==="
          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            identify "/tmp/vpk_check/$f" 2>/dev/null || echo "$f: errore identify"
          done

          echo ""
          ls -lh *.vpk
          rm -rf /tmp/vpk_check

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/*.vpk
