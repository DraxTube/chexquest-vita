name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source files
        run: |
          for f in doomgeneric_vita.c CMakeLists.txt; do
            if [ ! -f "$f" ]; then echo "MANCANTE: $f"; exit 1; fi
            echo "OK: $f"
          done

      - name: Install VitaSDK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./bootstrap-vitasdk.sh
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Generate icon only
        run: |
          rm -rf sce_sys
          mkdir -p sce_sys

          python3 << 'PYEOF'
          import struct, zlib, os

          def make_png(width, height, r, g, b, path):
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)

              row = bytes([r, g, b] * width)
              raw = b''
              for y in range(height):
                  raw += b'\x00' + row

              png = b'\x89PNG\r\n\x1a\n'
              png += chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0))
              png += chunk(b'IDAT', zlib.compress(raw, 9))
              png += chunk(b'IEND', b'')

              with open(path, 'wb') as f:
                  f.write(png)
              print(f"OK: {path} ({width}x{height}, {os.path.getsize(path)} bytes)")

          make_png(128, 128, 46, 139, 87, "sce_sys/icon0.png")
          PYEOF

          echo "=== icon0.png ==="
          xxd -l 30 sce_sys/icon0.png

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Verify VPK
        run: |
          cd build
          echo "=== Contenuto VPK ==="
          unzip -l *.vpk
          echo ""

          mkdir -p /tmp/vpk_check
          unzip -o *.vpk -d /tmp/vpk_check

          echo "=== File ==="
          for f in eboot.bin sce_sys/param.sfo sce_sys/icon0.png; do
            if [ ! -s "/tmp/vpk_check/$f" ]; then
              echo "MANCANTE: $f"
              exit 1
            fi
            echo "OK: $f ($(wc -c < /tmp/vpk_check/$f) bytes)"
          done

          echo ""
          echo "=== param.sfo ==="
          strings /tmp/vpk_check/sce_sys/param.sfo

          echo ""
          echo "=== Nessun file LiveArea (test minimale) ==="
          if [ -d "/tmp/vpk_check/sce_sys/livearea" ]; then
            echo "ATTENZIONE: cartella livearea presente!"
            find /tmp/vpk_check/sce_sys/livearea -type f
          else
            echo "OK: nessun file LiveArea"
          fi

          echo ""
          ls -lh *.vpk
          rm -rf /tmp/vpk_check

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/*.vpk
