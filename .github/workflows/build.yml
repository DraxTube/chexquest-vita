name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source files
        run: |
          for f in doomgeneric_vita.c CMakeLists.txt; do
            if [ ! -f "$f" ]; then echo "MANCANTE: $f"; exit 1; fi
            echo "OK: $f"
          done

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick optipng

      - name: Convert LiveArea assets to Vita-compatible PNG
        run: |
          echo "=== Conversione immagini per PS Vita ==="
          mkdir -p sce_sys/livearea/contents

          # -------------------------------------------------------
          # icon0.png — 128x128 — RGB 24-bit (NO ALPHA!)
          # La Vita rifiuta icon0 con canale alpha
          # -------------------------------------------------------
          if [ -f sce_sys/icon0.png ]; then
            echo "Conversione icon0.png..."
            convert sce_sys/icon0.png \
              -resize 128x128! \
              -alpha off \
              -strip \
              -interlace none \
              -depth 8 \
              -define png:color-type=2 \
              -define png:bit-depth=8 \
              -define png:exclude-chunks=all \
              -define png:compression-level=9 \
              pnm:- | convert pnm:- \
              -define png:color-type=2 \
              -define png:exclude-chunks=all \
              -interlace none \
              -depth 8 \
              PNG24:sce_sys/icon0.png
            optipng -quiet -strip all sce_sys/icon0.png 2>/dev/null || true
          else
            echo "icon0.png non trovato, genero placeholder..."
            convert -size 128x128 xc:'#2E8B57' \
              -fill '#FFD700' -gravity center -pointsize 40 -annotate +0+0 'CQ' \
              -alpha off -strip -interlace none -depth 8 \
              -define png:color-type=2 \
              -define png:exclude-chunks=all \
              PNG24:sce_sys/icon0.png
            optipng -quiet -strip all sce_sys/icon0.png 2>/dev/null || true
          fi

          # -------------------------------------------------------
          # bg.png — 840x500 — RGB 24-bit (no alpha)
          # -------------------------------------------------------
          if [ -f sce_sys/livearea/contents/bg.png ]; then
            echo "Conversione bg.png..."
            convert sce_sys/livearea/contents/bg.png \
              -resize 840x500! \
              -alpha off \
              -strip \
              -interlace none \
              -depth 8 \
              pnm:- | convert pnm:- \
              -define png:color-type=2 \
              -define png:exclude-chunks=all \
              -interlace none \
              -depth 8 \
              PNG24:sce_sys/livearea/contents/bg.png
            optipng -quiet -strip all sce_sys/livearea/contents/bg.png 2>/dev/null || true
          else
            echo "bg.png non trovato, genero placeholder..."
            convert -size 840x500 xc:'#0f3460' \
              -fill white -gravity center -pointsize 60 -annotate +0+0 'CHEX QUEST' \
              -alpha off -strip -interlace none -depth 8 \
              -define png:color-type=2 \
              -define png:exclude-chunks=all \
              PNG24:sce_sys/livearea/contents/bg.png
            optipng -quiet -strip all sce_sys/livearea/contents/bg.png 2>/dev/null || true
          fi

          # -------------------------------------------------------
          # startup.png — 280x158 — RGBA 32-bit (questo puo avere alpha)
          # -------------------------------------------------------
          if [ -f sce_sys/livearea/contents/startup.png ]; then
            echo "Conversione startup.png..."
            convert sce_sys/livearea/contents/startup.png \
              -resize 280x158! \
              -strip \
              -interlace none \
              -depth 8 \
              -alpha on -alpha set \
              -background none \
              pnm:- | convert pnm:- \
              -define png:color-type=2 \
              -define png:exclude-chunks=all \
              -interlace none \
              -depth 8 \
              PNG24:sce_sys/livearea/contents/startup.png
            optipng -quiet -strip all sce_sys/livearea/contents/startup.png 2>/dev/null || true
          else
            echo "startup.png non trovato, genero placeholder..."
            convert -size 280x158 xc:'#e94560' \
              -fill white -gravity center -pointsize 40 -annotate +0+0 'PLAY' \
              -alpha off -strip -interlace none -depth 8 \
              -define png:color-type=2 \
              -define png:exclude-chunks=all \
              PNG24:sce_sys/livearea/contents/startup.png
            optipng -quiet -strip all sce_sys/livearea/contents/startup.png 2>/dev/null || true
          fi

          # -------------------------------------------------------
          # template.xml — UTF-8 senza BOM
          # -------------------------------------------------------
          printf '<?xml version="1.0" encoding="utf-8"?>\n<livearea style="a1" format-ver="01.00" content-rev="1">\n  <livearea-bg>\n    <image>bg.png</image>\n  </livearea-bg>\n  <gate>\n    <startup-image>startup.png</startup-image>\n  </gate>\n</livearea>\n' > sce_sys/livearea/contents/template.xml

          # -------------------------------------------------------
          # Verifica finale
          # -------------------------------------------------------
          echo ""
          echo "=== Verifica finale ==="
          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png \
                   sce_sys/livearea/contents/template.xml; do
            if [ -f "$f" ]; then
              SIZE=$(wc -c < "$f")
              echo "OK: $f ($SIZE bytes)"
            else
              echo "ERRORE: $f mancante!"
              exit 1
            fi
          done

          echo ""
          echo "=== Dettagli PNG ==="
          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            INFO=$(identify -format 'size=%wx%h depth=%[bit-depth] type=%[type] channels=%[channels] interlace=%[interlace]' "$f" 2>/dev/null)
            echo "$f: $INFO"
          done

          # Verifica che non ci siano chunk problematici
          echo ""
          echo "=== Chunk PNG ==="
          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            CHUNKS=$(identify -verbose "$f" 2>/dev/null | grep -c "chunk" || echo "0")
            echo "$f: $CHUNKS extra chunks"
          done

      - name: Install VitaSDK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./bootstrap-vitasdk.sh
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Verify VPK
        run: |
          cd build
          echo "=== Contenuto VPK ==="
          unzip -l *.vpk
          echo ""
          echo "=== Verifica ==="
          mkdir -p /tmp/vpk_check
          unzip -o *.vpk -d /tmp/vpk_check
          for f in eboot.bin sce_sys/param.sfo sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png \
                   sce_sys/livearea/contents/template.xml; do
            if [ -f "/tmp/vpk_check/$f" ]; then
              echo "OK: $f ($(wc -c < /tmp/vpk_check/$f) bytes)"
            else
              echo "MANCANTE: $f"
              exit 1
            fi
          done
          echo ""
          echo "=== Dimensioni finali immagini nel VPK ==="
          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            identify "/tmp/vpk_check/$f" 2>/dev/null || echo "$f: non verificabile"
          done
          echo ""
          ls -lh *.vpk
          rm -rf /tmp/vpk_check

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/*.vpk
