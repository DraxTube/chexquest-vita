name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify files exist
        run: |
          for f in doomgeneric_vita.c CMakeLists.txt \
                   sce_sys/livearea/contents/template.xml; do
            if [ ! -f "$f" ]; then
              echo "MANCANTE: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Install VitaSDK
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          ./bootstrap-vitasdk.sh
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h
          echo "OPL3 header first line:"
          head -1 doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Generate LiveArea assets
        run: |
          sudo apt-get install -y imagemagick wget

          mkdir -p sce_sys/livearea/contents

          # Download immagini
          wget -q -O /tmp/chex_logo.jpg \
            "https://images.launchbox-app.com/098d8137-5376-4acd-a17d-521587a69ac9.jpg" || true

          wget -q -O /tmp/chex_wiki.png \
            "https://static.wikia.nocookie.net/chexquest/images/b/b7/Chex-Quest-Logo.png/revision/latest?cb=20250226015616" \
            --max-redirect=5 --user-agent="Mozilla/5.0" || true

          # icon0.png (128x128) - da logo wiki
          if [ -s /tmp/chex_wiki.png ]; then
            convert /tmp/chex_wiki.png -resize 128x128^ -gravity center -extent 128x128 -background '#1a5c2a' -flatten sce_sys/icon0.png
          else
            convert -size 128x128 xc:'#1a5c2a' -fill '#FFD700' -gravity center -font DejaVu-Sans-Bold -pointsize 28 -annotate +0-8 'CQ' -fill white -pointsize 11 -annotate +0+16 'CHEX QUEST' sce_sys/icon0.png
          fi

          # bg.png (840x500) - da immagine launchbox
          if [ -s /tmp/chex_logo.jpg ]; then
            convert /tmp/chex_logo.jpg -resize 840x500^ -gravity center -extent 840x500 sce_sys/livearea/contents/bg.png
          else
            convert -size 840x500 'gradient:#0f3460-#1a5c2a' -fill white -gravity center -font DejaVu-Sans-Bold -pointsize 48 -annotate +0+0 'CHEX QUEST' sce_sys/livearea/contents/bg.png
          fi

          # pic0.png (960x544) - da stessa immagine
          if [ -s /tmp/chex_logo.jpg ]; then
            convert /tmp/chex_logo.jpg -resize 960x544^ -gravity center -extent 960x544 sce_sys/pic0.png
          else
            convert -size 960x544 'gradient:#0a2a0a-#1a5c2a' -fill '#FFD700' -gravity center -font DejaVu-Sans-Bold -pointsize 72 -annotate +0+0 'CHEX QUEST' sce_sys/pic0.png
          fi

          # startup.png (280x158)
          convert -size 280x158 xc:'#e94560' -fill white -gravity center -font DejaVu-Sans-Bold -pointsize 36 -annotate +0-8 'START' -fill '#FFD700' -pointsize 14 -annotate +0+22 'CHEX QUEST' sce_sys/livearea/contents/startup.png

          echo "=== Assets ==="
          ls -la sce_sys/icon0.png sce_sys/pic0.png
          ls -la sce_sys/livearea/contents/

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/*.vpk
