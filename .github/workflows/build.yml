name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify files exist
        run: |
          if [ ! -f "doomgeneric_vita.c" ]; then
            echo "ERROR: doomgeneric_vita.c not found!"
            exit 1
          fi
          if [ ! -f "CMakeLists.txt" ]; then
            echo "ERROR: CMakeLists.txt not found!"
            exit 1
          fi
          echo "All files OK"

      - name: Install VitaSDK
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          ./bootstrap-vitasdk.sh
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h
          echo "OPL3 header first line:"
          head -1 doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Generate LiveArea assets
        run: |
          sudo apt-get install -y imagemagick

          mkdir -p sce_sys/livearea/contents

          # === icon0.png (128x128) ===
          convert -size 128x128 xc:'#1a5c2a' \
            -fill '#2E8B57' -draw "roundrectangle 8,8 120,120 12,12" \
            -fill '#FFD700' -gravity center \
            -font DejaVu-Sans-Bold -pointsize 32 \
            -annotate +0-15 'CQ' \
            -fill white -pointsize 12 \
            -annotate +0+18 'CHEX' \
            -annotate +0+32 'QUEST' \
            -fill '#e94560' -pointsize 8 \
            -annotate +0+48 'PS VITA' \
            sce_sys/icon0.png
          echo "icon0.png created"

          # === pic0.png (960x544) ===
          convert -size 960x544 \
            'gradient:#0a2a0a-#1a5c2a' \
            -fill '#FFD700' -gravity center \
            -font DejaVu-Sans-Bold -pointsize 72 \
            -annotate +0-80 'CHEX QUEST' \
            -fill white -pointsize 32 \
            -annotate +0+10 'PS Vita Edition' \
            -fill '#e94560' -pointsize 20 \
            -annotate +0+60 'OPL3 Music - Full Sound - Touch Controls' \
            -fill 'rgba(255,255,255,0.3)' -pointsize 14 \
            -gravity south -annotate +0+20 'doomgeneric port v1.0' \
            sce_sys/pic0.png
          echo "pic0.png created"

          # === bg.png (840x500) ===
          convert -size 840x500 \
            'gradient:#0f3460-#1a5c2a' \
            -fill 'rgba(255,215,0,0.6)' -gravity center \
            -font DejaVu-Sans-Bold -pointsize 48 \
            -annotate +0-40 'CHEX QUEST' \
            -fill 'rgba(255,255,255,0.4)' -pointsize 20 \
            -annotate +0+20 'PS Vita' \
            sce_sys/livearea/contents/bg.png
          echo "bg.png created"

          # === startup.png (280x158) ===
          convert -size 280x158 xc:'#e94560' \
            -fill white -gravity center \
            -font DejaVu-Sans-Bold -pointsize 36 \
            -annotate +0-10 'START' \
            -fill '#FFD700' -pointsize 14 \
            -annotate +0+25 'CHEX QUEST' \
            sce_sys/livearea/contents/startup.png
          echo "startup.png created"

          # === template.xml ===
          cat > sce_sys/livearea/contents/template.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <livearea style="a1" format-ver="01.00" content-rev="1">
            <livearea-bg>
              <image>bg.png</image>
            </livearea-bg>
            <gate>
              <startup-image>startup.png</startup-image>
            </gate>
          </livearea>
          XMLEOF

          echo ""
          echo "=== Final assets ==="
          ls -la sce_sys/
          ls -la sce_sys/livearea/contents/
          file sce_sys/icon0.png
          file sce_sys/pic0.png

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/*.vpk
