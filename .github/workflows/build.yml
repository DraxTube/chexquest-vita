name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source files
        run: |
          for f in doomgeneric_vita.c CMakeLists.txt; do
            if [ ! -f "$f" ]; then echo "MANCANTE: $f"; exit 1; fi
            echo "OK: $f"
          done

      - name: Install VitaSDK
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          ./bootstrap-vitasdk.sh
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Generate LiveArea assets
        run: |
          sudo apt-get install -y python3-pip pngcheck
          pip3 install Pillow

          rm -rf sce_sys
          mkdir -p sce_sys/livearea/contents

          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import urllib.request
          import struct
          import os

          def save_vita_png(img, path):
              """Salva PNG 24-bit RGB puro, zero chunk extra"""
              # FORZA conversione a RGB 24-bit (no alpha MAI)
              rgb = img.convert('RGB')
              # Pulisci TUTTI i metadati
              rgb.info = {}
              # Salva senza ottimizzazioni che aggiungono chunk
              rgb.save(path, 'PNG', optimize=False)
              # Ora rimuovi tutti i chunk non essenziali dal file
              strip_png_chunks(path)

          def strip_png_chunks(path):
              """Rimuove TUTTI i chunk PNG tranne IHDR, IDAT, IEND"""
              with open(path, 'rb') as f:
                  data = f.read()
              sig = b'\x89PNG\r\n\x1a\n'
              if data[:8] != sig:
                  print(f"  ERRORE: {path} non e' PNG!")
                  return
              out = bytearray(sig)
              pos = 8
              kept = []
              removed = []
              while pos + 12 <= len(data):
                  length = struct.unpack('>I', data[pos:pos+4])[0]
                  chunk_type = data[pos+4:pos+8].decode('ascii', errors='replace')
                  chunk_end = pos + 12 + length
                  if chunk_end > len(data):
                      break
                  if chunk_type in ('IHDR', 'IDAT', 'IEND'):
                      out.extend(data[pos:chunk_end])
                      kept.append(chunk_type)
                  else:
                      removed.append(chunk_type)
                  pos = chunk_end
              with open(path, 'wb') as f:
                  f.write(bytes(out))
              print(f"  Kept: {kept}")
              if removed:
                  print(f"  Removed: {removed}")

          # Scarica title screen
          title_img = None
          try:
              urllib.request.urlretrieve(
                  "https://tcrf.net/images/1/11/Chex_Quest-title.png",
                  "/tmp/chex_title.png"
              )
              t = Image.open("/tmp/chex_title.png")
              title_img = t.convert('RGB')  # Converti subito a RGB
              print(f"Title screen OK: {t.size} mode={t.mode} -> RGB")
          except Exception as e:
              print(f"Title screen non disponibile: {e}")

          try:
              font_big = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 48)
              font_med = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 36)
              font_title = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 28)
              font_small = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 14)
              font_xs = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 11)
          except:
              font_big = font_med = font_title = font_small = font_xs = ImageFont.load_default()

          # === ICON0.PNG — 128x128 ===
          print("\nGenerando icon0.png...")
          if title_img:
              icon = title_img.resize((128, 128), Image.LANCZOS)
          else:
              icon = Image.new('RGB', (128, 128), (46, 139, 87))
              d = ImageDraw.Draw(icon)
              d.text((64, 48), "CQ", fill=(255, 215, 0), font=font_title, anchor="mm")
              d.text((64, 80), "CHEX QUEST", fill=(255, 255, 255), font=font_xs, anchor="mm")
          save_vita_png(icon, "sce_sys/icon0.png")
          print(f"  Dimensione: {os.path.getsize('sce_sys/icon0.png')} bytes")

          # === BG.PNG — 840x500 ===
          print("\nGenerando bg.png...")
          if title_img:
              bg = title_img.resize((840, 500), Image.LANCZOS)
          else:
              bg = Image.new('RGB', (840, 500), (15, 52, 96))
              d = ImageDraw.Draw(bg)
              d.text((420, 230), "CHEX QUEST", fill=(255, 255, 255), font=font_big, anchor="mm")
              d.text((420, 280), "PS Vita", fill=(200, 200, 200), font=font_small, anchor="mm")
          save_vita_png(bg, "sce_sys/livearea/contents/bg.png")
          print(f"  Dimensione: {os.path.getsize('sce_sys/livearea/contents/bg.png')} bytes")

          # === STARTUP.PNG — 280x158 ===
          print("\nGenerando startup.png...")
          if title_img:
              startup = title_img.resize((280, 158), Image.LANCZOS)
          else:
              startup = Image.new('RGB', (280, 158), (233, 69, 96))
              d = ImageDraw.Draw(startup)
              d.text((140, 65), "PLAY", fill=(255, 255, 255), font=font_med, anchor="mm")
              d.text((140, 100), "CHEX QUEST", fill=(255, 215, 0), font=font_small, anchor="mm")
          save_vita_png(startup, "sce_sys/livearea/contents/startup.png")
          print(f"  Dimensione: {os.path.getsize('sce_sys/livearea/contents/startup.png')} bytes")

          # === VERIFICA FINALE ===
          print("\n=== VERIFICA PNG ===")
          for path in ["sce_sys/icon0.png",
                       "sce_sys/livearea/contents/bg.png",
                       "sce_sys/livearea/contents/startup.png"]:
              img = Image.open(path)
              print(f"{path}: size={img.size} mode={img.mode}")
              if img.mode != 'RGB':
                  print(f"  ERRORE: modo {img.mode}, dovrebbe essere RGB!")
                  exit(1)
              # Verifica color type nel raw PNG
              with open(path, 'rb') as f:
                  raw = f.read()
              # Color type e' al byte 25 (offset 8+8+4+4+1 = 25)
              # IHDR: width(4) height(4) bitdepth(1) colortype(1)
              color_type = raw[25]
              bit_depth = raw[24]
              print(f"  PNG bit_depth={bit_depth} color_type={color_type}")
              if color_type != 2:
                  print(f"  ERRORE: color_type={color_type}, dovrebbe essere 2 (RGB)!")
                  exit(1)
              if bit_depth != 8:
                  print(f"  ERRORE: bit_depth={bit_depth}, dovrebbe essere 8!")
                  exit(1)

          print("\nTutti i PNG sono 24-bit RGB puliti!")
          PYEOF

          # --- TEMPLATE.XML ---
          printf '<?xml version="1.0" encoding="utf-8"?>\n' > sce_sys/livearea/contents/template.xml
          printf '<livearea style="a1" format-ver="01.00" content-rev="1">\n' >> sce_sys/livearea/contents/template.xml
          printf '  <livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <image>bg.png</image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '  <gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <startup-image>startup.png</startup-image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '</livearea>\n' >> sce_sys/livearea/contents/template.xml

          # --- VALIDAZIONE FINALE ---
          echo ""
          echo "=== PNGCHECK ==="
          for f in sce_sys/icon0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            pngcheck -v "$f" 2>&1 | head -5
            echo ""
          done

          echo "=== TEMPLATE.XML ==="
          cat sce_sys/livearea/contents/template.xml
          FIRST_BYTE=$(xxd -l 1 -p sce_sys/livearea/contents/template.xml)
          if [ "$FIRST_BYTE" != "3c" ]; then
            echo "ERRORE: BOM presente!"
            exit 1
          fi

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Verify VPK
        run: |
          cd build
          mkdir -p /tmp/vpk_check
          unzip -o *.vpk -d /tmp/vpk_check

          echo "=== STRUTTURA VPK ==="
          unzip -l *.vpk
          echo ""

          echo "=== PARAM.SFO ==="
          xxd /tmp/vpk_check/sce_sys/param.sfo | head -20
          strings /tmp/vpk_check/sce_sys/param.sfo
          echo ""

          echo "=== VERIFICA FILES ==="
          for f in eboot.bin sce_sys/param.sfo sce_sys/icon0.png \
                   sce_sys/livearea/contents/template.xml \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png; do
            if [ ! -s "/tmp/vpk_check/$f" ]; then
              echo "MANCANTE: $f"
              exit 1
            fi
            echo "OK: $f ($(wc -c < /tmp/vpk_check/$f) bytes)"
          done
          echo ""

          echo "=== PNG DETTAGLI ==="
          for png in sce_sys/icon0.png \
                     sce_sys/livearea/contents/bg.png \
                     sce_sys/livearea/contents/startup.png; do
            echo "--- $png ---"
            pngcheck -v "/tmp/vpk_check/$png" 2>&1 | head -3
            # Mostra color type dal raw
            python3 -c "
          with open('/tmp/vpk_check/$png', 'rb') as f:
              d = f.read(30)
          print(f'  bit_depth={d[24]} color_type={d[25]}')
          ct = {0:'Grayscale', 2:'RGB', 3:'Palette', 4:'Gray+Alpha', 6:'RGBA'}
          print(f'  tipo: {ct.get(d[25], \"SCONOSCIUTO\")}')
          "
            echo ""
          done

          echo "=== VPK ==="
          ls -lh *.vpk
          rm -rf /tmp/vpk_check

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/*.vpk
