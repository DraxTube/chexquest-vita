name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source files
        run: |
          for f in doomgeneric_vita.c CMakeLists.txt; do
            if [ ! -f "$f" ]; then
              echo "MANCANTE: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Install VitaSDK
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          ./bootstrap-vitasdk.sh
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h
          echo "OPL3 header first line:"
          head -1 doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Generate LiveArea assets
        run: |
          sudo apt-get install -y imagemagick

          # Rimuovi tutto e ricrea da zero
          rm -rf sce_sys
          mkdir -p sce_sys/livearea/contents

          # icon0.png (128x128) - PNG semplice senza metadata
          convert -size 128x128 xc:'#2E8B57' \
            -fill '#FFD700' -gravity center \
            -font DejaVu-Sans-Bold -pointsize 28 \
            -annotate +0-8 'CQ' \
            -fill white -pointsize 11 \
            -annotate +0+16 'CHEX QUEST' \
            -strip -define png:exclude-chunk=all \
            sce_sys/icon0.png

          # pic0.png (960x544)
          convert -size 960x544 xc:'#1a1a2e' \
            -fill '#FFD700' -gravity center \
            -font DejaVu-Sans-Bold -pointsize 72 \
            -annotate +0-40 'CHEX QUEST' \
            -fill white -pointsize 28 \
            -annotate +0+30 'PS Vita Edition' \
            -strip -define png:exclude-chunk=all \
            sce_sys/pic0.png

          # bg.png (840x500)
          convert -size 840x500 xc:'#0f3460' \
            -fill white -gravity center \
            -font DejaVu-Sans-Bold -pointsize 48 \
            -annotate +0-20 'CHEX QUEST' \
            -fill '#cccccc' -pointsize 20 \
            -annotate +0+30 'PS Vita' \
            -strip -define png:exclude-chunk=all \
            sce_sys/livearea/contents/bg.png

          # startup.png (280x158)
          convert -size 280x158 xc:'#e94560' \
            -fill white -gravity center \
            -font DejaVu-Sans-Bold -pointsize 36 \
            -annotate +0-8 'START' \
            -fill '#FFD700' -pointsize 14 \
            -annotate +0+22 'CHEX QUEST' \
            -strip -define png:exclude-chunk=all \
            sce_sys/livearea/contents/startup.png

          # template.xml - printf garantisce zero BOM e zero spazi iniziali
          printf '<?xml version="1.0" encoding="utf-8"?>\n' > sce_sys/livearea/contents/template.xml
          printf '<livearea style="a1" format-ver="01.00" content-rev="1">\n' >> sce_sys/livearea/contents/template.xml
          printf '  <livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <image>bg.png</image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </livearea-bg>\n' >> sce_sys/livearea/contents/template.xml
          printf '  <gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '    <startup-image>startup.png</startup-image>\n' >> sce_sys/livearea/contents/template.xml
          printf '  </gate>\n' >> sce_sys/livearea/contents/template.xml
          printf '</livearea>\n' >> sce_sys/livearea/contents/template.xml

          # Verifica tutti i file
          echo "=== Verifica assets ==="
          for f in sce_sys/icon0.png sce_sys/pic0.png \
                   sce_sys/livearea/contents/bg.png \
                   sce_sys/livearea/contents/startup.png \
                   sce_sys/livearea/contents/template.xml; do
            if [ ! -s "$f" ]; then
              echo "ERRORE: $f mancante o vuoto!"
              exit 1
            fi
            SIZE=$(wc -c < "$f")
            echo "OK: $f ($SIZE bytes)"
          done

          # Mostra primi byte del template (deve iniziare con 3C = '<')
          echo "=== Primi byte template.xml ==="
          xxd -l 20 sce_sys/livearea/contents/template.xml

          # Mostra contenuto template
          echo "=== Contenuto template.xml ==="
          cat sce_sys/livearea/contents/template.xml

          # Verifica dimensioni PNG
          echo "=== Dimensioni PNG ==="
          identify sce_sys/icon0.png
          identify sce_sys/pic0.png
          identify sce_sys/livearea/contents/bg.png
          identify sce_sys/livearea/contents/startup.png

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Verify VPK contents
        run: |
          cd build
          echo "=== Contenuto VPK ==="
          unzip -l *.vpk
          echo ""
          echo "=== Verifica file richiesti nel VPK ==="
          unzip -l *.vpk | grep "sce_sys" || echo "ERRORE: sce_sys mancante nel VPK!"

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/*.vpk
