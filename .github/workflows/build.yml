name: Build Chex Quest PS Vita

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake git python3

      - name: Setup VitaSDK
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          git clone https://github.com/vitasdk/vdpm.git /tmp/vdpm
          cd /tmp/vdpm
          ./bootstrap-vitasdk.sh
          echo "VITASDK=/usr/local/vitasdk" >> $GITHUB_ENV
          echo "/usr/local/vitasdk/bin" >> $GITHUB_PATH

      - name: Verify VitaSDK tools
        run: |
          which arm-vita-eabi-gcc && echo "GCC OK"
          which vita-elf-create && echo "vita-elf-create OK" || echo "vita-elf-create MISSING"
          which vita-make-fself && echo "vita-make-fself OK" || echo "vita-make-fself MISSING"
          which vita-mksfoex && echo "vita-mksfoex OK" || echo "vita-mksfoex MISSING"
          which vita-pack-vpk && echo "vita-pack-vpk OK" || echo "vita-pack-vpk MISSING"

      - name: Clone doomgeneric
        run: |
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git
          echo "=== doomgeneric .c files ==="
          ls doomgeneric/doomgeneric/*.c

      - name: Copy Vita platform file
        run: cp vita/doomgeneric_vita.c doomgeneric/doomgeneric/

      - name: Generate assets
        run: python3 scripts/gen_assets.py

      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
                -DCMAKE_BUILD_TYPE=Release .. 2>&1 | tee cmake.log
          echo ""
          echo "=== CMAKE EXIT CODE: $? ==="

      - name: Build
        run: |
          cd build
          make -j$(nproc) 2>&1 | tee build.log
          BUILD_EXIT=$?
          echo ""
          echo "=== MAKE EXIT CODE: $BUILD_EXIT ==="
          echo ""
          echo "=== All files in build/ ==="
          ls -la
          echo ""
          echo "=== Looking for output files ==="
          find . -name "*.vpk" -o -name "*.self" -o -name "*.velf" -o -name "*.elf" | head -20
          echo ""
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "BUILD FAILED"
            exit 1
          fi

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuest-Vita-VPK
          path: build/*.vpk
          if-no-files-found: warn

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: |
            build/build.log
            build/cmake.log
