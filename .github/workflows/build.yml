name: Build ChexQuest Vita

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify files exist
        run: |
          if [ ! -f "doomgeneric_vita.c" ]; then
            echo "ERROR: doomgeneric_vita.c not found!"
            exit 1
          fi
          if [ ! -f "CMakeLists.txt" ]; then
            echo "ERROR: CMakeLists.txt not found!"
            exit 1
          fi
          echo "All files OK"

      - name: Install VitaSDK
        run: |
          git clone --depth 1 https://github.com/vitasdk/vdpm.git
          cd vdpm
          ./bootstrap-vitasdk.sh
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          ./install-all.sh

      - name: Clone doomgeneric
        run: |
          rm -rf doomgeneric
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Download Nuked OPL3
        run: |
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.c \
            -o doomgeneric/doomgeneric/opl3.c
          curl -sL https://raw.githubusercontent.com/nukeykt/Nuked-OPL3/master/opl3.h \
            -o doomgeneric/doomgeneric/opl3.h
          echo "OPL3 header first line:"
          head -1 doomgeneric/doomgeneric/opl3.h

      - name: Copy vita source
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c

      - name: Generate LiveArea assets
        run: |
          sudo apt-get install -y imagemagick wget

          mkdir -p sce_sys/livearea/contents

          # Scarica logo Chex Quest
          wget -q -O /tmp/chex_logo.png \
            "https://static.wikia.nocookie.net/chexquest/images/b/b7/Chex-Quest-Logo.png/revision/latest?cb=20250226015616" \
            --user-agent="Mozilla/5.0" || true

          # Scarica title screen
          wget -q -O /tmp/chex_title.png \
            "https://tcrf.net/images/1/11/Chex_Quest-title.png" \
            --user-agent="Mozilla/5.0" || true

          # Verifica download
          echo "Downloaded files:"
          ls -la /tmp/chex_logo.png /tmp/chex_title.png 2>/dev/null || true

          # === icon0.png (128x128) ===
          if [ -f /tmp/chex_logo.png ] && [ -s /tmp/chex_logo.png ]; then
            convert /tmp/chex_logo.png \
              -resize 128x128 \
              -gravity center \
              -background '#1a1a2e' \
              -extent 128x128 \
              sce_sys/icon0.png
            echo "icon0.png created from logo"
          else
            convert -size 128x128 xc:'#2E8B57' \
              -fill white -gravity center \
              -font DejaVu-Sans-Bold -pointsize 18 \
              -annotate +0-12 'CHEX' \
              -annotate +0+12 'QUEST' \
              sce_sys/icon0.png
            echo "icon0.png created (fallback)"
          fi

          # === pic0.png (960x544) ===
          if [ -f /tmp/chex_title.png ] && [ -s /tmp/chex_title.png ]; then
            convert /tmp/chex_title.png \
              -resize 960x544^ \
              -gravity center \
              -extent 960x544 \
              sce_sys/pic0.png
            echo "pic0.png created from title screen"
          else
            convert -size 960x544 \
              'gradient:#1a1a2e-#16213e' \
              -fill '#e94560' -gravity center \
              -font DejaVu-Sans-Bold -pointsize 72 \
              -annotate +0-50 'CHEX QUEST' \
              -fill white -pointsize 28 \
              -annotate +0+50 'PS Vita Edition' \
              sce_sys/pic0.png
            echo "pic0.png created (fallback)"
          fi

          # === bg.png (840x500) - LiveArea background ===
          if [ -f /tmp/chex_title.png ] && [ -s /tmp/chex_title.png ]; then
            convert /tmp/chex_title.png \
              -resize 840x500^ \
              -gravity center \
              -extent 840x500 \
              -brightness-contrast -20x0 \
              sce_sys/livearea/contents/bg.png
            echo "bg.png created from title screen"
          else
            convert -size 840x500 \
              'gradient:#0f3460-#533483' \
              -fill white -gravity south \
              -font DejaVu-Sans -pointsize 18 \
              -annotate +0+20 'Chex Quest - Vita Port' \
              sce_sys/livearea/contents/bg.png
            echo "bg.png created (fallback)"
          fi

          # === startup.png (280x158) - Pulsante Start ===
          if [ -f /tmp/chex_logo.png ] && [ -s /tmp/chex_logo.png ]; then
            convert /tmp/chex_logo.png \
              -resize 260x120 \
              -gravity center \
              -background '#e94560' \
              -extent 280x158 \
              sce_sys/livearea/contents/startup.png
            echo "startup.png created from logo"
          else
            convert -size 280x158 xc:'#e94560' \
              -fill white -gravity center \
              -font DejaVu-Sans-Bold -pointsize 36 \
              -annotate +0+0 'START' \
              sce_sys/livearea/contents/startup.png
            echo "startup.png created (fallback)"
          fi

          # === template.xml ===
          cat > sce_sys/livearea/contents/template.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <livearea style="a1" format-ver="01.00" content-rev="1">
            <livearea-bg>
              <image>bg.png</image>
            </livearea-bg>
            <gate>
              <startup-image>startup.png</startup-image>
            </gate>
          </livearea>
          XMLEOF

          echo ""
          echo "=== Final assets ==="
          ls -la sce_sys/
          ls -la sce_sys/livearea/contents/
          file sce_sys/icon0.png
          file sce_sys/pic0.png

      - name: Build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuestVita
          path: build/*.vpk
