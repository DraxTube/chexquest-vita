name: Build Chex Quest PS Vita

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git python3

      - name: Setup VitaSDK
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          git clone https://github.com/vitasdk/vdpm.git /tmp/vdpm
          cd /tmp/vdpm
          ./bootstrap-vitasdk.sh
          echo "VITASDK=/usr/local/vitasdk" >> $GITHUB_ENV
          echo "/usr/local/vitasdk/bin" >> $GITHUB_PATH

      - name: Install Vita packages
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          cd /tmp/vdpm
          # Install each package, show what happens
          echo "=== Installing vita2d ==="
          vdpm vita2d 2>&1 || echo "vita2d via vdpm failed, trying manual..."
          
          # If vdpm doesn't have vita2d, install it manually
          if [ ! -f "$VITASDK/arm-vita-eabi/include/vita2d.h" ]; then
            echo "Installing libvita2d manually..."
            git clone https://github.com/aspect11/libvita2d.git /tmp/libvita2d
            cd /tmp/libvita2d/libvita2d
            mkdir -p build && cd build
            cmake -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake ..
            make -j$(nproc)
            make install
            cd /tmp/vdpm
          fi
          
          echo "=== Installing other packages ==="
          vdpm zlib 2>&1 || true
          vdpm libpng 2>&1 || true
          vdpm SDL2 2>&1 || true
          
          echo "=== Checking vita2d.h ==="
          find $VITASDK -name "vita2d.h" 2>/dev/null || echo "vita2d.h NOT FOUND"
          find $VITASDK -name "libvita2d.a" 2>/dev/null || echo "libvita2d.a NOT FOUND"
          echo "=== Available headers ==="
          ls $VITASDK/arm-vita-eabi/include/vita2d* 2>/dev/null || echo "No vita2d headers"
          ls $VITASDK/arm-vita-eabi/include/psp2/ 2>/dev/null | head -20

      - name: Clone doomgeneric
        run: git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Copy Vita platform file
        run: cp vita/doomgeneric_vita.c doomgeneric/doomgeneric/

      - name: Generate assets
        run: python3 scripts/gen_assets.py

      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
                -DCMAKE_BUILD_TYPE=Release .. 2>&1 | tee cmake.log

      - name: Build
        run: |
          cd build
          make -j$(nproc) VERBOSE=1 2>&1 | tee build.log
          echo "=== Output files ==="
          find . -name "*.vpk" -o -name "*.self" 2>/dev/null

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuest-Vita-VPK
          path: build/*.vpk
          if-no-files-found: warn

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: |
            build/build.log
            build/cmake.log
