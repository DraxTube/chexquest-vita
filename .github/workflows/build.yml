name: Build Chex Quest PS Vita

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            curl \
            wget \
            python3 \
            patch \
            pkg-config

      - name: Setup VitaSDK
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          git clone https://github.com/vitasdk/vdpm.git /tmp/vdpm
          cd /tmp/vdpm
          ./bootstrap-vitasdk.sh
          echo "VITASDK=/usr/local/vitasdk" >> $GITHUB_ENV
          echo "/usr/local/vitasdk/bin" >> $GITHUB_PATH

      - name: Install Vita packages via vdpm
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          cd /tmp/vdpm
          # Installa i pacchetti uno per uno con vdpm
          vdpm zlib || true
          vdpm libpng || true
          vdpm libogg || true
          vdpm libvorbis || true
          vdpm libmikmod || true
          vdpm libFLAC || true
          vdpm mpg123 || true
          vdpm SDL2 || true
          vdpm SDL2_mixer || true
          vdpm SDL2_net || true

      - name: Clone Chocolate Doom
        run: |
          git clone --depth 1 --branch chocolate-doom-3.0.1 \
            https://github.com/chocolate-doom/chocolate-doom.git

      - name: Prepare Vita source files
        run: |
          chmod +x scripts/prepare.sh
          bash scripts/prepare.sh

      - name: Generate placeholder assets
        run: |
          mkdir -p sce_sys/livearea/contents
          python3 scripts/gen_assets.py

      - name: Configure build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build
          cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
                -DCMAKE_BUILD_TYPE=Release \
                ..

      - name: Build
        run: |
          cd build
          make -j$(nproc) VERBOSE=1 2>&1 | tee build.log

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuest-Vita-VPK
          path: build/*.vpk
          if-no-files-found: warn

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build/build.log
